    <style>
        body {

<body>
    <script>(function () { var script = document.createElement('script'); script.src = "https://cdn.jsdelivr.net/npm/eruda"; document.body.append(script); script.onload = function () { eruda.init(); } })();</script>

    <div id="left-panel">
        <h1>Chess Bot</h1>
        <div id="console"></div>
        <div id="custom-prompt">
            <span id="prompt-message"></span><br>
            <input type="text" id="prompt-input">
            <button id="prompt-ok">OK</button>
        </div>
    </div>

    <div id="boardDiv"></div>

    <script>
        // --- 1. Console Interception ---
        const originalLog = console.log;
        const consoleDiv = document.getElementById('console');

        console.log = function (...args) {
            if (consoleDiv) {
                const msg = args.map(arg =>
                    typeof arg === 'object' ? JSON.stringify(arg) : arg
                ).join(' ');
                consoleDiv.innerHTML += msg + '\n';
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            }
            originalLog.apply(console, args);
        };

        // --- 2. Prompt Interception ---
        const promptContainer = document.getElementById('custom-prompt');
        const promptMsg = document.getElementById('prompt-message');
        const promptInput = document.getElementById('prompt-input');
        const promptOk = document.getElementById('prompt-ok');

        window.prompt = function (message, defaultValue = "") {
            promptMsg.innerText = message;
            promptInput.value = defaultValue;
            promptContainer.style.display = 'block';
            promptInput.focus();

            return new Promise((resolve) => {
                const submit = () => {
                    const val = promptInput.value;
                    promptContainer.style.display = 'none';
                    promptInput.removeEventListener('keydown', handleKeyDown);
                    resolve(val);
                };

                const handleKeyDown = (e) => {
                    if (e.key === 'Enter') submit();
                };

                promptOk.onclick = submit;
                promptInput.addEventListener('keydown', handleKeyDown);
            });
        };
    </script>

    <script type="module">
        import { Chessground } from 'https://cdn.jsdelivr.net/npm/chessground@9.2.1/dist/chessground.min.js';

        // Piece-Square Tables (from white's perspective, index 0 = rank 1 / a-file)
        // Flipped vertically for black.
        export const PST = {
            pawn: [
                0, 0, 0, 0, 0, 0, 0, 0,
                50, 50, 50, 50, 50, 50, 50, 50,
                10, 10, 20, 30, 30, 20, 10, 10,
                5, 5, 10, 25, 25, 10, 5, 5,
                0, 0, 0, 20, 20, 0, 0, 0,
                5, -5, -10, 0, 0, -10, -5, 5,
                5, 10, 10, -20, -20, 10, 10, 5,
                0, 0, 0, 0, 0, 0, 0, 0,
            ],
            knight: [
                -50, -40, -30, -30, -30, -30, -40, -50,
                -40, -20, 0, 0, 0, 0, -20, -40,
                -30, 0, 10, 15, 15, 10, 0, -30,
                -30, 5, 15, 20, 20, 15, 5, -30,
                -30, 0, 15, 20, 20, 15, 0, -30,
                -30, 5, 10, 15, 15, 10, 5, -30,
                -40, -20, 0, 5, 5, 0, -20, -40,
                -50, -40, -30, -30, -30, -30, -40, -50,
            ],
            bishop: [
                -20, -10, -10, -10, -10, -10, -10, -20,
                -10, 0, 0, 0, 0, 0, 0, -10,
                -10, 0, 10, 10, 10, 10, 0, -10,
                -10, 5, 5, 10, 10, 5, 5, -10,
                -10, 0, 5, 10, 10, 5, 0, -10,
                -10, 10, 10, 10, 10, 10, 10, -10,
                -10, 5, 0, 0, 0, 0, 5, -10,
                -20, -10, -10, -10, -10, -10, -10, -20,
            ],
            rook: [
                0, 0, 0, 0, 0, 0, 0, 0,
                5, 10, 10, 10, 10, 10, 10, 5,
                -5, 0, 0, 0, 0, 0, 0, -5,
                -5, 0, 0, 0, 0, 0, 0, -5,
                -5, 0, 0, 0, 0, 0, 0, -5,
                -5, 0, 0, 0, 0, 0, 0, -5,
                -5, 0, 0, 0, 0, 0, 0, -5,
                0, 0, 0, 5, 5, 0, 0, 0,
            ],
            queen: [
                -20, -10, -10, -5, -5, -10, -10, -20,
                -10, 0, 0, 0, 0, 0, 0, -10,
                -10, 0, 5, 5, 5, 5, 0, -10,
                -5, 0, 5, 5, 5, 5, 0, -5,
                0, 0, 5, 5, 5, 5, 0, -5,
                -10, 5, 5, 5, 5, 5, 0, -10,
                -10, 0, 5, 0, 0, 0, 0, -10,
                -20, -10, -10, -5, -5, -10, -10, -20,
            ],
            king: [
                -30, -40, -40, -50, -50, -40, -40, -30,
                -30, -40, -40, -50, -50, -40, -40, -30,
                -30, -40, -40, -50, -50, -40, -40, -30,
                -30, -40, -40, -50, -50, -40, -40, -30,
                -20, -30, -30, -40, -40, -30, -30, -20,
                -10, -20, -20, -20, -20, -20, -20, -10,
                20, 20, 0, 0, 0, 0, 20, 20,
                20, 30, 10, 0, 0, 10, 30, 20,
            ],
        };

        export function getPstValue(piece, color, x, y) {
            const table = PST[piece];
            if (!table) return 0;
            const index = color === "white" ? (7 - y) * 8 + x : y * 8 + x;
            return table[index];
        }

        export class ChessBot {
            constructor(fen = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1") {
                this._ttable = new Map();
                this.board = {
                    cells: [],
                    turn: "white",
                    canCastle: {
                        white: { kingside: true, queenside: true },
                        black: { kingside: true, queenside: true },
                    },
                    didCastle: { white: false, black: false },
                    enpassant: null,
                };
                for (let i = 0; i < 8; i++) {
                    this.board.cells[i] = [];
                    for (let j = 0; j < 8; j++) {
                        this.board.cells[i][j] = { type: { piece: "pawn", color: "empty" } };
                    }
                }
                this._parse_fen(fen);
            }
            getAvailableMoves(board = this.board) {
                const roots = [];
                for (let x = 0; x < 8; x++) {
                    for (let y = 0; y < 8; y++) {
                        const cell = board.cells[y][x];
                        if (cell.type.color !== board.turn) continue;
                        const childBoards = this._getAvailableMovesForCell(cell, { x, y }, board);
                        for (const childBoard of childBoards) {
                            roots.push({ board: childBoard, children: [] });
                        }
                    }
                }
                return roots;
            }
            printBoard(board = this.board) {
                console.log(board.cells
                    .map((row) => row
                        .map((cell) => {
                            if (cell.type.color === "empty") return "-";
                            const pieceMap = { pawn: "p", knight: "n", bishop: "b", rook: "r", queen: "q", king: "k" };
                            const piece = pieceMap[cell.type.piece];
                            return cell.type.color === "white" ? piece.toUpperCase() : piece;
                        })
                        .join(" "))
                    .join("\n"));
            }
            getBoardValue(board = this.board) {
                let reward = 0;
                const materialValues = { pawn: 100, knight: 320, bishop: 330, rook: 500, queen: 900, king: 20000 };
                let whiteBishops = 0, blackBishops = 0;
                let whiteKingPos = null, blackKingPos = null;
                for (let y = 0; y < 8; y++) {
                    for (let x = 0; x < 8; x++) {
                        const cell = board.cells[y][x];
                        if (cell.type.color === "empty") continue;
                        const sign = cell.type.color === "white" ? 1 : -1;
                        const piece = cell.type.piece;
                        const color = cell.type.color;
                        reward += sign * materialValues[piece];
                        reward += sign * getPstValue(piece, color, x, y);
                        if (piece === "bishop") { color === "white" ? whiteBishops++ : blackBishops++; }
                        if (piece === "king") {
                            if (color === "white") whiteKingPos = { x, y };
                            else blackKingPos = { x, y };
                        }
                        if (piece === "rook") {
                            if (color === "white" && y === 6) reward += 40;
                            if (color === "black" && y === 1) reward -= 40;
                        }
                    }
                }
                if (whiteBishops >= 2) reward += 50;
                if (blackBishops >= 2) reward -= 50;
                if (board.didCastle.white) reward += 60;
                if (board.didCastle.black) reward -= 60;
                const whitePawnsPerFile = new Array(8).fill(0);
                const blackPawnsPerFile = new Array(8).fill(0);
                const whiteRooksPerFile = new Array(8).fill(0);
                const blackRooksPerFile = new Array(8).fill(0);
                for (let x = 0; x < 8; x++) {
                    for (let y = 0; y < 8; y++) {
                        const cell = board.cells[y][x];
                        if (cell.type.color === "empty") continue;
                        if (cell.type.piece === "pawn") { cell.type.color === "white" ? whitePawnsPerFile[x]++ : blackPawnsPerFile[x]++; }
                        if (cell.type.piece === "rook") { cell.type.color === "white" ? whiteRooksPerFile[x]++ : blackRooksPerFile[x]++; }
                    }
                }
                for (let x = 0; x < 8; x++) {
                    if (whitePawnsPerFile[x] > 1) reward -= 20 * (whitePawnsPerFile[x] - 1);
                    if (blackPawnsPerFile[x] > 1) reward += 20 * (blackPawnsPerFile[x] - 1);
                    if (whitePawnsPerFile[x] > 0) {
                        const hasNeighbor = (x > 0 && whitePawnsPerFile[x - 1] > 0) || (x < 7 && whitePawnsPerFile[x + 1] > 0);
                        if (!hasNeighbor) reward -= 15 * whitePawnsPerFile[x];
                    }
                    if (blackPawnsPerFile[x] > 0) {
                        const hasNeighbor = (x > 0 && blackPawnsPerFile[x - 1] > 0) || (x < 7 && blackPawnsPerFile[x + 1] > 0);
                        if (!hasNeighbor) reward += 15 * blackPawnsPerFile[x];
                    }
                    if (whitePawnsPerFile[x] > 0 && blackPawnsPerFile[x] === 0) {
                        for (let y = 7; y >= 0; y--) {
                            const c = board.cells[y][x];
                            if (c.type.piece === "pawn" && c.type.color === "white") {
                                let passed = true;
                                for (let fy = y + 1; fy < 8; fy++) {
                                    if (x > 0 && board.cells[fy][x - 1].type.piece === "pawn" && board.cells[fy][x - 1].type.color === "black") { passed = false; break; }
                                    if (x < 7 && board.cells[fy][x + 1].type.piece === "pawn" && board.cells[fy][x + 1].type.color === "black") { passed = false; break; }
                                }
                                if (passed) reward += 30 + (y > 3 ? (y - 3) * 15 : 0);
                                break;
                            }
                        }
                    }
                    if (blackPawnsPerFile[x] > 0 && whitePawnsPerFile[x] === 0) {
                        for (let y = 0; y < 8; y++) {
                            const c = board.cells[y][x];
                            if (c.type.piece === "pawn" && c.type.color === "black") {
                                let passed = true;
                                for (let fy = y - 1; fy >= 0; fy--) {
                                    if (x > 0 && board.cells[fy][x - 1].type.piece === "pawn" && board.cells[fy][x - 1].type.color === "white") { passed = false; break; }
                                    if (x < 7 && board.cells[fy][x + 1].type.piece === "pawn" && board.cells[fy][x + 1].type.color === "white") { passed = false; break; }
                                }
                                if (passed) reward -= 30 + (y < 4 ? (4 - y) * 15 : 0);
                                break;
                            }
                        }
                    }
                    if (whiteRooksPerFile[x] > 0 && whitePawnsPerFile[x] === 0 && blackPawnsPerFile[x] === 0) reward += 25;
                    if (blackRooksPerFile[x] > 0 && whitePawnsPerFile[x] === 0 && blackPawnsPerFile[x] === 0) reward -= 25;
                    if (whiteRooksPerFile[x] > 0 && whitePawnsPerFile[x] === 0 && blackPawnsPerFile[x] > 0) reward += 15;
                    if (blackRooksPerFile[x] > 0 && blackPawnsPerFile[x] === 0 && whitePawnsPerFile[x] > 0) reward -= 15;
                }
                const countPawnShield = (kingPos, color) => {
                    let count = 0;
                    const dir = color === "white" ? 1 : -1;
                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = 1; dy <= 2; dy++) {
                            const nx = kingPos.x + dx, ny = kingPos.y + dir * dy;
                            if (nx >= 0 && nx < 8 && ny >= 0 && ny < 8) {
                                const cell = board.cells[ny][nx];
                                if (cell.type.piece === "pawn" && cell.type.color === color) count++;
                            }
                        }
                    }
                    return count;
                };
                if (whiteKingPos) reward += countPawnShield(whiteKingPos, "white") * 10;
                if (blackKingPos) reward -= countPawnShield(blackKingPos, "black") * 10;
                if (this._isInCheck(board.turn, board)) { reward += board.turn === "white" ? -100 : 100; }
                return reward;
            }
            getBoardValueBreakdown(board = this.board) {
                const b = {
                    material: 0, pst: 0, bishopPair: 0, castling: 0, rookSeventh: 0,
                    doubledPawns: 0, isolatedPawns: 0, passedPawns: 0,
                    rookOpenFile: 0, rookSemiOpenFile: 0, kingSafety: 0, checkPenalty: 0, total: 0,
                };
                const materialValues = { pawn: 100, knight: 320, bishop: 330, rook: 500, queen: 900, king: 20000 };
                let whiteBishops = 0, blackBishops = 0;
                let whiteKingPos = null, blackKingPos = null;
                for (let y = 0; y < 8; y++) {
                    for (let x = 0; x < 8; x++) {
                        const cell = board.cells[y][x];
                        if (cell.type.color === "empty") continue;
                        const sign = cell.type.color === "white" ? 1 : -1;
                        const piece = cell.type.piece;
                        const color = cell.type.color;
                        b.material += sign * materialValues[piece];
                        b.pst += sign * getPstValue(piece, color, x, y);
                        if (piece === "bishop") color === "white" ? whiteBishops++ : blackBishops++;
                        if (piece === "king") { if (color === "white") whiteKingPos = { x, y }; else blackKingPos = { x, y }; }
                        if (piece === "rook") {
                            if (color === "white" && y === 6) b.rookSeventh += 40;
                            if (color === "black" && y === 1) b.rookSeventh -= 40;
                        }
                    }
                }
                if (whiteBishops >= 2) b.bishopPair += 50;
                if (blackBishops >= 2) b.bishopPair -= 50;
                if (board.didCastle.white) b.castling += 60;
                if (board.didCastle.black) b.castling -= 60;
                const whitePawnsPerFile = new Array(8).fill(0);
                const blackPawnsPerFile = new Array(8).fill(0);
                const whiteRooksPerFile = new Array(8).fill(0);
                const blackRooksPerFile = new Array(8).fill(0);
                for (let x = 0; x < 8; x++) {
                    for (let y = 0; y < 8; y++) {
                        const cell = board.cells[y][x];
                        if (cell.type.color === "empty") continue;
                        if (cell.type.piece === "pawn") { cell.type.color === "white" ? whitePawnsPerFile[x]++ : blackPawnsPerFile[x]++; }
                        if (cell.type.piece === "rook") { cell.type.color === "white" ? whiteRooksPerFile[x]++ : blackRooksPerFile[x]++; }
                    }
                }
                for (let x = 0; x < 8; x++) {
                    if (whitePawnsPerFile[x] > 1) b.doubledPawns -= 20 * (whitePawnsPerFile[x] - 1);
                    if (blackPawnsPerFile[x] > 1) b.doubledPawns += 20 * (blackPawnsPerFile[x] - 1);
                    if (whitePawnsPerFile[x] > 0) {
                        const hasNeighbor = (x > 0 && whitePawnsPerFile[x - 1] > 0) || (x < 7 && whitePawnsPerFile[x + 1] > 0);
                        if (!hasNeighbor) b.isolatedPawns -= 15 * whitePawnsPerFile[x];
                    }
                    if (blackPawnsPerFile[x] > 0) {
                        const hasNeighbor = (x > 0 && blackPawnsPerFile[x - 1] > 0) || (x < 7 && blackPawnsPerFile[x + 1] > 0);
                        if (!hasNeighbor) b.isolatedPawns += 15 * blackPawnsPerFile[x];
                    }
                    if (whitePawnsPerFile[x] > 0 && blackPawnsPerFile[x] === 0) {
                        for (let y = 7; y >= 0; y--) {
                            const c = board.cells[y][x];
                            if (c.type.piece === "pawn" && c.type.color === "white") {
                                let passed = true;
                                for (let fy = y + 1; fy < 8; fy++) {
                                    if (x > 0 && board.cells[fy][x - 1].type.piece === "pawn" && board.cells[fy][x - 1].type.color === "black") { passed = false; break; }
                                    if (x < 7 && board.cells[fy][x + 1].type.piece === "pawn" && board.cells[fy][x + 1].type.color === "black") { passed = false; break; }
                                }
                                if (passed) b.passedPawns += 30 + (y > 3 ? (y - 3) * 15 : 0);
                                break;
                            }
                        }
                    }
                    if (blackPawnsPerFile[x] > 0 && whitePawnsPerFile[x] === 0) {
                        for (let y = 0; y < 8; y++) {
                            const c = board.cells[y][x];
                            if (c.type.piece === "pawn" && c.type.color === "black") {
                                let passed = true;
                                for (let fy = y - 1; fy >= 0; fy--) {
                                    if (x > 0 && board.cells[fy][x - 1].type.piece === "pawn" && board.cells[fy][x - 1].type.color === "white") { passed = false; break; }
                                    if (x < 7 && board.cells[fy][x + 1].type.piece === "pawn" && board.cells[fy][x + 1].type.color === "white") { passed = false; break; }
                                }
                                if (passed) b.passedPawns -= 30 + (y < 4 ? (4 - y) * 15 : 0);
                                break;
                            }
                        }
                    }
                    if (whiteRooksPerFile[x] > 0 && whitePawnsPerFile[x] === 0 && blackPawnsPerFile[x] === 0) b.rookOpenFile += 25;
                    if (blackRooksPerFile[x] > 0 && whitePawnsPerFile[x] === 0 && blackPawnsPerFile[x] === 0) b.rookOpenFile -= 25;
                    if (whiteRooksPerFile[x] > 0 && whitePawnsPerFile[x] === 0 && blackPawnsPerFile[x] > 0) b.rookSemiOpenFile += 15;
                    if (blackRooksPerFile[x] > 0 && blackPawnsPerFile[x] === 0 && whitePawnsPerFile[x] > 0) b.rookSemiOpenFile -= 15;
                }
                const countPawnShield = (kingPos, color) => {
                    let count = 0;
                    const dir = color === "white" ? 1 : -1;
                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = 1; dy <= 2; dy++) {
                            const nx = kingPos.x + dx, ny = kingPos.y + dir * dy;
                            if (nx >= 0 && nx < 8 && ny >= 0 && ny < 8) {
                                if (board.cells[ny][nx].type.piece === "pawn" && board.cells[ny][nx].type.color === color) count++;
                            }
                        }
                    }
                    return count;
                };
                if (whiteKingPos) b.kingSafety += countPawnShield(whiteKingPos, "white") * 10;
                if (blackKingPos) b.kingSafety -= countPawnShield(blackKingPos, "black") * 10;
                if (this._isInCheck(board.turn, board)) { b.checkPenalty += board.turn === "white" ? -100 : 100; }
                b.total = b.material + b.pst + b.bishopPair + b.castling + b.rookSeventh
                    + b.doubledPawns + b.isolatedPawns + b.passedPawns
                    + b.rookOpenFile + b.rookSemiOpenFile + b.kingSafety + b.checkPenalty;
                return b;
            }
            getRankedMoves(depth = 1, board = this.board) {
                this._ttable.clear();
                const legalMoves = this._generateLegalMoves(board);
                if (legalMoves.length === 0) return [];
                const maximizing = board.turn === "white";
                legalMoves.sort((a, b) => {
                    const aVal = this._quickMaterialCount(a);
                    const bVal = this._quickMaterialCount(b);
                    return maximizing ? bVal - aVal : aVal - bVal;
                });
                const scored = [];
                let alpha = -Infinity, beta = Infinity;
                for (const move of legalMoves) {
                    const score = this._alphaBeta(move, depth - 1, alpha, beta, !maximizing);
                    scored.push({ score, board: move });
                    if (maximizing) alpha = Math.max(alpha, score);
                    else beta = Math.min(beta, score);
                }
                scored.sort((a, b) => maximizing ? b.score - a.score : a.score - b.score);
                return scored.map(s => ({
                    notation: this._toChessNotation(board, s.board),
                    board: s.board,
                    score: s.score,
                }));
            }
            makeMove(notation) {
                const possibleMoves = this.getAvailableMoves(this.board);
                const legalMoves = possibleMoves.filter((m) => !this._isInCheck(this.board.turn, m.board));
                for (const move of legalMoves) {
                    const moveNotation = this._toChessNotation(this.board, move.board);
                    if (moveNotation === notation) { this.board = move.board; return true; }
                }
                const stripped = notation.replace(/[+#]$/, "");
                for (const move of legalMoves) {
                    const moveNotation = this._toChessNotation(this.board, move.board).replace(/[+#]$/, "");
                    if (moveNotation === stripped) { this.board = move.board; return true; }
                }
                return false;
            }
            _toChessNotation(fromBoard, toBoard) {

                const winner = bot.board.turn === "white" ? "Black" : "White";
                return `Checkmate! ${winner} wins! 🏆`;
            }
            return "Stalemate — it's a draw! 🤝";
        }
        function printStatus(bot) {
            bot.printBoard();
            prettyBoard(bot);
            const gameOver = checkGameOver(bot);
            if (gameOver) {
                console.log(`\n${gameOver}\n`);
            } else {
                const inCheck = bot.isInCheck(bot.board.turn, bot.board);
                const checkStr = inCheck ? " ⚠ CHECK!" : "";
                console.log(`\nTurn: ${bot.board.turn}${checkStr}\n`);
            }
        }

        // Stub — no Stockfish in browser
        async function stockfishEval(fen) {
            throw new Error("Stockfish not available in browser");
        }

        let searchDepth = 3;
        async function main() {
            console.log("♟  Chess Bot  ♟");
            console.log("Commands:");
            console.log("  fen <FEN>     — load a position from FEN");
            console.log("  export        — export current position as FEN");
            console.log("  <move>        — make a move (e.g. e4, Nf3, O-O)");
            console.log("  bot           — let the bot play the current side");
            console.log("  moves         — list all legal moves");
            console.log("  eval          — show bot evaluation");
            console.log("  depth <n>     — set search depth (currently " + searchDepth + ")");
            console.log("  quit          — exit\n");
            let bot = new ChessBot();
            printStatus(bot);
            while (true) {
                const input = (await prompt("> ")).trim();
                if (!input) continue;
                if (input === "quit" || input === "exit") { console.log("Bye! ♔"); break; }
                if (input.startsWith("fen ")) {
                    const fen = input.slice(4).trim();
                    try { bot = new ChessBot(fen); printStatus(bot); }
                    catch (e) { console.log(`Invalid FEN: ${e.message}\n`); }
                    continue;
                }
                if (input === "export") { console.log(`FEN: ${bot.toFEN()}\n`); continue; }
                if (input.startsWith("depth")) {
                    const parts = input.split(/\s+/);
                    const n = parseInt(parts[1]);
                    if (isNaN(n) || n < 1 || n > 10) { console.log(`Usage: depth <1-10>  (current: ${searchDepth})\n`); }
                    else { searchDepth = n; console.log(`Search depth set to ${searchDepth}\n`); }
                    continue;
                }
                if (input === "moves") {
                    const legal = getLegalMoves(bot);
                    const notations = legal.map((m) => bot.toChessNotation(bot.board, m.board));
                    const unique = [...new Set(notations)].sort();
                    console.log(`Legal moves (${unique.length}): ${unique.join(", ")}\n`);
                    continue;
                }
                if (input === "eval") {
                    const val = bot.getBoardValue();
                    const sign = val >= 0 ? "+" : "";
                    console.log(`Bot eval:  ${sign}${val} (positive = white advantage)`);
                    const fen = bot.toFEN();
                    try {
                        const sf = await stockfishEval(fen);
                        if (sf.mate !== null) { console.log(`Stockfish: mate in ${sf.mate}`); }
                        else { console.log(`Stockfish: ${sf.eval >= 0 ? "+" : ""}${sf.eval} cp  (depth 16)`); }
                        console.log(`Best move: ${sf.bestMove}`);
                    } catch (_) {
                        console.log("Stockfish: (not available in browser)");
                    }
                    console.log();
                    continue;
                }
                if (input === "bot") {
                    if (checkGameOver(bot)) { console.log("Game is already over. Use `fen` to load a new position.\n"); continue; }
                    console.log(`Bot is thinking (depth ${searchDepth})...`);
                    const t = performance.now();
                    const rankedMoves = bot.getRankedMoves(searchDepth);
                    const elapsed = (performance.now() - t).toFixed(0);
                    if (rankedMoves.length === 0) { console.log("No legal moves — game over!\n"); continue; }
                    let played = false;
                    for (const { notation, board: moveBoard } of rankedMoves) {
                        if (bot.makeMove(notation)) { console.log(`Bot plays: ${notation}  (${elapsed}ms)`); played = true; break; }
                    }
                    if (!played) {
                        const best = rankedMoves[0];
                        bot.board = best.board;
                        console.log(`Bot plays: ${best.notation}  (${elapsed}ms)  [notation fallback]`);
                    }
                    printStatus(bot);
                    continue;
                }
                if (checkGameOver(bot)) { console.log("Game is already over. Use `fen` to load a new position.\n"); continue; }
                const ok = bot.makeMove(input);
                if (!ok) { console.log(`Illegal or unrecognised move: "${input}". Try "moves" to see legal moves.\n`); continue; }
                printStatus(bot);
            }
        }
        main();
    </script>
